name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # `pip install -e .` invokes maturin (declared in `[build-system]
      # requires`) under the hood, which calls cargo to build the Rust
      # extension. The toolchain has to be available before the install
      # step, otherwise build-isolation pulls maturin but `cargo` is
      # missing.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies (builds Rust extension via maturin)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -c "from headroom._core import DiffCompressor; print('headroom._core OK:', DiffCompressor)"

      # The memory tests embed text via sentence-transformers
      # (all-MiniLM-L6-v2), downloaded from HuggingFace on first use. CI hit HF
      # live inside every test, so HF rate-limits (HTTP 429) failed dozens of
      # memory tests with "couldn't connect to huggingface.co". Cache the HF Hub
      # dir and pre-fetch the model once (with backoff) so tests reuse the cache;
      # the static key means main warms it for every branch/run. fastembed is
      # NOT installed in this job (it lives in the [relevance] extra) — the
      # relevance model is handled in the test-extras job instead. An HF_TOKEN
      # secret, when present, lifts the unauthenticated rate limit.
      - name: Cache HuggingFace models (sentence-transformers)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-all-MiniLM-L6-v2-v1

      - name: Pre-fetch embedding model (resilient to HF rate limits)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_TELEMETRY: "1"
        run: |
          for i in 1 2 3 4 5 6; do
            if python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2'); print('embedding model ready')"; then
              exit 0
            fi
            echo "::warning::all-MiniLM-L6-v2 fetch attempt $i failed; backing off"
            sleep $((i * 30))
          done
          echo "::error::could not fetch all-MiniLM-L6-v2 from HuggingFace (rate limited?)"
          exit 1

      - name: Run linting
        if: matrix.python-version == '3.12'
        run: |
          ruff check .
          ruff format --check .

      - name: Run type checking
        if: matrix.python-version == '3.12'
        run: |
          mypy headroom --ignore-missing-imports

      - name: Run tests
        run: |
          pytest -v --tb=short tests scripts/tests

      - name: Run tests with coverage
        if: matrix.python-version == '3.11'
        run: |
          pytest tests scripts/tests --cov=headroom --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  test-extras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install with relevance extras (builds Rust extension via maturin)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,relevance]"
          python -c "from headroom._core import SmartCrusher; print('headroom._core OK:', SmartCrusher)"

      # test_relevance.py embeds via fastembed (BAAI/bge-small-en-v1.5 →
      # qdrant/bge-small-en-v1.5-onnx-q on HF). Same HF-429 problem as the test
      # job: cache fastembed's model dir and pre-fetch once with backoff. (This
      # is the job where fastembed is installed; the test job uses
      # sentence-transformers instead.)
      - name: Configure fastembed cache dir
        run: echo "FASTEMBED_CACHE_PATH=$HOME/.cache/fastembed" >> "$GITHUB_ENV"

      - name: Cache embedding model (fastembed)
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: ${{ runner.os }}-fastembed-bge-small-en-v1.5-onnx-q-v1

      - name: Pre-fetch fastembed model (resilient to HF rate limits)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_TELEMETRY: "1"
        run: |
          for i in 1 2 3 4 5 6; do
            if python -c "from fastembed import TextEmbedding; TextEmbedding('BAAI/bge-small-en-v1.5'); print('fastembed model ready')"; then
              exit 0
            fi
            echo "::warning::fastembed model fetch attempt $i failed; backing off"
            sleep $((i * 30))
          done
          echo "::error::could not fetch the fastembed model from HuggingFace (rate limited?)"
          exit 1

      - name: Run relevance tests
        run: |
          pytest tests/test_relevance.py -v

  test-agno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install with agno extras (builds Rust extension via maturin)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,agno]"

      - name: Run agno tests
        run: |
          pytest tests/test_integrations/agno/ -v

  docker-native-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build local Headroom image
        run: |
          docker build -t headroom-native-e2e:latest .

      - name: Run Docker-native installer e2e
        env:
          HEADROOM_DOCKER_IMAGE: headroom-native-e2e:latest
        run: |
          bash e2e/docker-native-install.sh

      - name: Run Docker-native compose smoke test
        env:
          HEADROOM_IMAGE: headroom-native-e2e:latest
          HEADROOM_HOST_HOME: ${{ github.workspace }}
          HEADROOM_WORKSPACE: ${{ github.workspace }}
        run: |
          mkdir -p .headroom .claude .codex .gemini
          trap 'docker compose -f docker/docker-compose.native.yml down -v' EXIT
          docker compose -f docker/docker-compose.native.yml up -d proxy
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8787/readyz >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker compose -f docker/docker-compose.native.yml logs proxy
              exit 1
            fi
            sleep 1
          done

      - name: Run Docker-native wrap e2e
        run: |
          docker build -f e2e/wrap/Dockerfile -t headroom-wrap-e2e .
          docker run --rm headroom-wrap-e2e

      - name: Run Docker-native init e2e
        run: |
          docker build -f e2e/init/Dockerfile -t headroom-init-e2e .
          docker run --rm headroom-init-e2e

  windows-native-wrapper:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run native installer wrapper tests
        run: |
          pytest tests/test_install/test_native_installers.py -q

  macos-native-wrapper:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bash and test dependencies
        run: |
          brew install bash
          python -m pip install --upgrade pip
          python -m pip install --retries 10 --timeout 60 pytest

      - name: Run native installer wrapper tests
        run: |
          BASH_PREFIX="$(brew --prefix bash)"
          export PATH="$BASH_PREFIX/bin:$PATH"
          pytest tests/test_install/test_native_installers.py -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Single-wheel build via maturin: produces both the linux wheel and
      # the platform-independent sdist in one shot. release.yml's matrix
      # is what builds per-platform wheels for PyPI; this `build` job is
      # a smoke check that the build system is wired right.
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install 'maturin>=1.5,<2.0' twine

      - name: Build wheel + sdist
        run: |
          maturin sdist --out dist
          maturin build --release --out dist

      - name: Check package
        run: |
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  commitlint:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Merge pull request ')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v5
        with:
          configFile: .commitlintrc.json

  workflow-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          sudo mv ./actionlint /usr/local/bin/actionlint

      - name: Install act
        run: |
          curl -fsSL https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash
          sudo install ./bin/act /usr/local/bin/act

      - name: Validate workflow files
        run: |
          bash scripts/validate-workflows.sh
